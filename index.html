<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxury Cinematic Gift</title>

<!-- ✨ فونت فخم -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background: radial-gradient(circle at top, #0f1530, #070812, #000);
    font-family:'Cinzel', serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 🌟 نجوم ناعمة */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* 🌙 قمر واقعي */
.moon{
    position:absolute;
    top:50px;
    right:70px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:
        radial-gradient(circle at 30% 30%, #fff8c9, #d6d3a8 40%, #9c9a78 70%, #6b6a55 100%);
    box-shadow:
        inset -10px -10px 25px rgba(0,0,0,0.4),
        0 0 80px rgba(255,255,200,0.5);
}

/* 🌠 شهاب */
.shooting{
    position:absolute;
    width:120px;
    height:2px;
    background:linear-gradient(90deg,white,transparent);
    animation:shoot 6s linear infinite;
    opacity:0;
}

@keyframes shoot{
    0%{transform:translate(-200px,100px);opacity:0;}
    10%{opacity:1;}
    100%{transform:translate(120vw,-200px);opacity:0;}
}

/* 🎁 بوكس */
.box{
    width:150px;
    height:150px;
    background: linear-gradient(145deg,#ff4d6d,#b5179e);
    border-radius:22px;
    box-shadow:0 25px 70px rgba(255,77,109,0.5);
    cursor:pointer;
    transition:0.5s;
}

.box:hover{
    transform:scale(1.05);
}

/* اختفاء */
.hide{
    animation: vanish 1s forwards;
}

@keyframes vanish{
    to{transform:scale(0) rotate(360deg);opacity:0;}
}

/* 🌌 النص الكبير الفخم */
#skyText{
    position:absolute;
    top:18%;
    width:100%;
    text-align:center;
    font-size:48px;
    font-weight:700;
    letter-spacing:2px;
    opacity:0;
    transform:scale(0.5);
    color:#fff;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #ff4d6d,
        0 0 40px #ff4d6d;
    transition:2s;
}

/* 💬 الرسالة */
#message{
    display:none;
    text-align:center;
    max-width:380px;
    font-size:18px;
    line-height:1.8;
    letter-spacing:1px;
}
</style>
</head>

<body>

<div class="moon"></div>

<div class="shooting" style="top:25%;animation-delay:0s;"></div>
<div class="shooting" style="top:50%;animation-delay:2s;"></div>
<div class="shooting" style="top:70%;animation-delay:4s;"></div>

<div id="skyText">بحبك اوي يا جومانا</div>

<div class="box" id="box" onclick="openBox()"></div>

<div id="message"></div>

<script>

/* 🌟 نجوم */
for(let i=0;i<140;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(Math.random()*3+1)+"s";
    document.body.appendChild(s);
}

/* كتابة */
function typeText(text, el, speed){
    let i=0;
    function run(){
        if(i<text.length){
            el.innerHTML += text[i];
            i++;
            setTimeout(run,speed);
        }
    }
    run();
}

function openBox(){

    document.getElementById("box").classList.add("hide");

    setTimeout(()=>{
        let sky=document.getElementById("skyText");
        sky.style.opacity="1";
        sky.style.transform="scale(1)";
    },900);

    setTimeout(()=>{
        let msg=document.getElementById("message");
        msg.style.display="block";

        typeText(
`في لحظة زي دي...
الكلام مش كفاية ✨

بس الإحساس هو اللي بيتكلم 💫

دي مش مجرد مفاجأة...
دي لحظة مختلفة ❤️`,
        msg,45);
    },1700);
}

</script>

</body>
</html>
