<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxury Gift Scene</title>

<!-- 🔤 فونت فخم حقيقي -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background: radial-gradient(circle at top, #0c1230, #06070f, #000);
    font-family:'Cormorant Garamond', serif;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* 🌌 نجوم */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:twinkle 3s infinite;
}
@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* 🌙 قمر واقعي */
.moon{
    position:absolute;
    top:60px;
    right:70px;
    width:140px;
    height:140px;
    border-radius:50%;
    background:
        radial-gradient(circle at 30% 30%, #fff9dc 0%, #e6e1b3 35%, #b5b08f 60%, #6c6a55 100%);
    box-shadow:
        inset -20px -20px 40px rgba(0,0,0,0.4),
        inset 10px 10px 25px rgba(255,255,255,0.1),
        0 0 90px rgba(255,255,200,0.5);
}

/* 🌠 شهاب */
.shooting{
    position:absolute;
    width:120px;
    height:2px;
    background:linear-gradient(90deg,#fff,transparent);
    animation:shoot 6s linear infinite;
    opacity:0;
}
@keyframes shoot{
    0%{transform:translate(-200px,100px);opacity:0;}
    10%{opacity:1;}
    100%{transform:translate(120vw,-200px);opacity:0;}
}

/* 🎁 بوكس هدية حقيقي */
.gift{
    width:140px;
    height:140px;
    position:relative;
    cursor:pointer;
    transform-style:preserve-3d;
}

/* الصندوق */
.base{
    position:absolute;
    bottom:0;
    width:100%;
    height:100%;
    background:linear-gradient(145deg,#ff4d6d,#c9184a);
    border-radius:12px;
    box-shadow:0 25px 70px rgba(255,77,109,0.4);
}

/* الغطا */
.lid{
    position:absolute;
    top:-10px;
    width:100%;
    height:40%;
    background:linear-gradient(145deg,#ff2e5e,#9d0208);
    border-radius:10px;
    transform-origin:bottom;
    transition:1s;
}

/* شريط */
.ribbon-v{
    position:absolute;
    width:20px;
    height:100%;
    background:#ffd166;
    left:50%;
    transform:translateX(-50%);
}

.ribbon-h{
    position:absolute;
    width:100%;
    height:20px;
    background:#ffd166;
    top:50%;
    transform:translateY(-50%);
}

/* فتح */
.open .lid{
    transform:rotateX(-140deg);
}

/* 🌌 النص */
#skyText{
    position:absolute;
    top:18%;
    width:100%;
    text-align:center;
    font-size:52px;
    font-weight:700;
    opacity:0;
    transform:scale(0.5);
    text-shadow:0 0 20px #fff, 0 0 40px #ffd166;
    transition:2s;
}

/* 💬 رسالة */
#message{
    display:none;
    text-align:center;
    max-width:380px;
    font-size:20px;
    line-height:1.8;
}
</style>
</head>

<body>

<div class="moon"></div>

<div class="shooting" style="top:20%;animation-delay:0s;"></div>
<div class="shooting" style="top:50%;animation-delay:2s;"></div>
<div class="shooting" style="top:70%;animation-delay:4s;"></div>

<div id="skyText">بحبك اوي يا جومانا</div>

<div class="gift" id="gift" onclick="openGift()">
    <div class="lid"></div>
    <div class="base"></div>
    <div class="ribbon-v"></div>
    <div class="ribbon-h"></div>
</div>

<div id="message"></div>

<script>

/* 🌟 نجوم */
for(let i=0;i<140;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(Math.random()*3+1)+"s";
    document.body.appendChild(s);
}

/* كتابة */
function typeText(text, el, speed){
    let i=0;
    function run(){
        if(i<text.length){
            el.innerHTML += text[i];
            i++;
            setTimeout(run,speed);
        }
    }
    run();
}

function openGift(){

    document.getElementById("gift").classList.add("open");

    setTimeout(()=>{
        document.getElementById("skyText").style.opacity="1";
        document.getElementById("skyText").style.transform="scale(1)";
    },900); 

    setTimeout(()=>{
        let msg=document.getElementById("message");
        msg.style.display="block";

        typeText(
`في لحظة زي دي...
الكلام مش كفاية ✨

بس الإحساس هو اللي بيتقال 💫

دي مش مجرد هدية...
دي لحظة خاصة جدًا ❤️`,
        msg,45);
    },1700);
}

</script>

</body>
</html>
