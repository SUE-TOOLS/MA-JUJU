<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxury Visual Gift</title>

<!-- 🔤 فونت فخم -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cairo:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background: radial-gradient(circle at top, #0b1230, #05060d, #000);
    font-family:'Playfair Display','Cairo',serif;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* 🌌 نجوم */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* ✨ particles */
.particle{
    position:absolute;
    width:4px;
    height:4px;
    background:rgba(255,255,255,0.6);
    border-radius:50%;
    animation:float 10s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

/* 🌙 قمر */
.moon{
    position:absolute;
    top:50px;
    right:70px;
    width:130px;
    height:130px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #fff9d6, #b8b49a, #6b6a55);
    box-shadow:0 0 80px rgba(255,255,200,0.5);
}

/* 🎁 بوكس */
.box{
    width:150px;
    height:150px;
    background:linear-gradient(145deg,#ff4d6d,#6a00f4);
    border-radius:18px;
    box-shadow:0 25px 70px rgba(106,0,244,0.4);
    cursor:pointer;
}

/* 🌌 النص الكبير */
#skyText{
    position:absolute;
    top:18%;
    width:100%;
    text-align:center;
    font-size:54px;
    font-weight:700;
    opacity:0;
    transform:scale(0.5);
    color:#f5f1e6;
    text-shadow:
        0 0 10px rgba(255,255,255,0.8),
        0 0 25px rgba(255,215,120,0.7),
        0 0 60px rgba(255,180,90,0.4);
    transition:2s;
}

/* 💬 الرسالة */
#message{
    display:none;
    text-align:center;
    max-width:420px;
    font-size:20px;
    line-height:1.9;
    color:#f8f4e8;
    letter-spacing:0.5px;
    text-shadow:0 0 10px rgba(255,255,255,0.3);
}

/* ✨ typing cursor */
.cursor{
    display:inline-block;
    width:10px;
    animation:blink 0.8s infinite;
}
@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>

<body>

<div class="moon"></div>

<div id="skyText">بحبك اوي يا جومانا</div>

<div class="box" onclick="openBox()"></div>

<div id="message"></div>

<script>

/* 🌟 نجوم */
for(let i=0;i<150;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(Math.random()*3+1)+"s";
    document.body.appendChild(s);
}

/* ✨ particles */
for(let i=0;i<40;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(Math.random()*10+5)+"s";
    document.body.appendChild(p);
}

/* 💬 typing أقوى */
function typeText(text, el, speed){
    let i=0;
    el.innerHTML="";
    function run(){
        if(i<text.length){
            el.innerHTML += text[i];
            i++;
            setTimeout(run,speed);
        }
    }
    run();
}

function openBox(){

    document.getElementById("skyText").style.opacity="1";
    document.getElementById("skyText").style.transform="scale(1)";

    setTimeout(()=>{
        let msg=document.getElementById("message");
        msg.style.display="block";

        typeText(
`في لحظة زي دي...
الكلام مش مجرد حروف ✨

ده إحساس بيتكتب عشانك إنتي بس 💫

كل حاجة هنا معمولة علشان اللحظة دي ❤️`,
        msg,35);
    },1200);
}

</script>

</body>
</html>
