<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Space Gift</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background: radial-gradient(circle at top, #0b1230, #05060d, #000);
    font-family:Arial;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 🌟 نجوم */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.7;
}

/* 🌙 قمر */
.moon{
    position:absolute;
    top:50px;
    right:60px;
    width:130px;
    height:130px;
    border-radius:50%;
    background:
      radial-gradient(circle at 30% 30%, #fffbe6, #d6d1a3 40%, #6b6a55);
    box-shadow:0 0 80px rgba(255,255,200,0.4);
}

/* 🪐 كواكب */
.planet{
    position:absolute;
    border-radius:50%;
}

/* 🧸 دباديب */
.teddy{
    position:absolute;
    font-size:28px;
    animation:float 4s ease-in-out infinite;
    opacity:0.9;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
}

/* 🍓 فراولة */
.strawberry{
    position:absolute;
    font-size:22px;
    animation:float2 5s ease-in-out infinite;
}

@keyframes float2{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* 🎁 بوكس */
.gift{
    width:150px;
    height:150px;
    position:relative;
    cursor:pointer;
}

.base{
    width:100%;
    height:100%;
    background:linear-gradient(145deg,#ff4d6d,#c9184a);
    border-radius:15px;
}

.lid{
    width:100%;
    height:50%;
    background:linear-gradient(145deg,#ff2e5e,#7a0000);
    position:absolute;
    top:0;
    border-radius:10px;
    transform-origin:bottom;
    transition:0.8s;
}

.open .lid{
    transform:rotateX(-140deg);
}

/* 💬 النص العلوي */
#topText{
    position:absolute;
    top:10%;
    width:100%;
    text-align:center;
    font-size:40px;
    font-weight:bold;
    text-shadow:0 0 20px rgba(255,255,255,0.5);
}

/* 💬 النص الجانبي */
#sideText{
    position:absolute;
    right:8%;
    max-width:360px;
    font-size:19px;
    line-height:1.9;
    display:none;
    text-shadow:0 0 10px rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<div class="moon"></div>

<div id="topText">بحبك اوي يا جومانا ❤️</div>

<div class="gift" id="gift" onclick="openGift()">
    <div class="lid"></div>
    <div class="base"></div>
</div>

<div id="sideText"></div>

<script>

/* 🌌 نجوم */
for(let i=0;i<150;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    s.style.opacity=Math.random();
    document.body.appendChild(s);
}

/* 🪐 كواكب */
for(let i=0;i<3;i++){
    let p=document.createElement("div");
    p.className="planet";
    p.style.width=(Math.random()*50+30)+"px";
    p.style.height=p.style.width;
    p.style.top=Math.random()*80+"vh";
    p.style.left=Math.random()*80+"vw";

    p.style.background=[
        "radial-gradient(circle,#7cc7ff,#1e3a8a)",
        "radial-gradient(circle,#ffb703,#fb8500)",
        "radial-gradient(circle,#90be6d,#2a9d8f)"
    ][i];

    document.body.appendChild(p);
}

/* 🧸 دباديب */
for(let i=0;i<16;i++){
    let t=document.createElement("div");
    t.className="teddy";
    t.innerHTML="🧸";
    t.style.left=(Math.random()*15)+"vw";
    t.style.top=Math.random()*100+"vh";
    document.body.appendChild(t);
}

for(let i=0;i<16;i++){
    let t=document.createElement("div");
    t.className="teddy";
    t.innerHTML="🧸";
    t.style.left=(80+Math.random()*15)+"vw";
    t.style.top=Math.random()*100+"vh";
    document.body.appendChild(t);
}

/* 🍓 فراولة */
for(let i=0;i<18;i++){
    let s=document.createElement("div");
    s.className="strawberry";
    s.innerHTML="🍓";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.body.appendChild(s);
}

/* ✍️ typing */
function typeText(text, el, speed){
    let i=0;
    el.innerHTML="";
    function run(){
        if(i<text.length){
            el.innerHTML += text[i];
            i++;
            setTimeout(run,speed);
        }
    }
    run();
}

/* 🎁 فتح */
function openGift(){
    document.getElementById("gift").classList.add("open");

    setTimeout(()=>{
        let side=document.getElementById("sideText");
        side.style.display="block";

        typeText(
`في لحظة زي دي... الدنيا بتسكت عشانك ✨

مفيش اهم ولا اغلي منك في الدنيا كلها

بنور عيني لقيتك احلي و احسن و انقي حاجة حصلتلي في الدنيا

انتي حظي الحلو في الدنيا دي 💫

مفيش اجمل منك والله يا اجمل بنت في العالم كله

انا بعشقك و بحبك اوي يا جومانا ❤️`,
        side,35);

    },900);
}

</script>

</body>
</html>
