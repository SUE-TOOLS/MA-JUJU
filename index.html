<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IMAX Gift Fixed</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background: radial-gradient(circle at top, #1a1f3f, #090a14, #000);
    font-family:Arial;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 🌙 القمر */
.moon{
    position:absolute;
    top:60px;
    right:80px;
    width:90px;
    height:90px;
    background:#f5f3ce;
    border-radius:50%;
    box-shadow:0 0 60px rgba(255,255,200,0.7);
}

/* 🌠 شهاب */
.shooting{
    position:absolute;
    width:120px;
    height:2px;
    background:linear-gradient(90deg,white,transparent);
    animation:shoot 6s linear infinite;
    opacity:0;
}

@keyframes shoot{
    0%{transform:translate(-200px,100px);opacity:0;}
    10%{opacity:1;}
    100%{transform:translate(120vw,-200px);opacity:0;}
}

/* ✨ النجوم */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:twinkle 2s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* 🎁 بوكس */
.box{
    width:150px;
    height:150px;
    background:linear-gradient(145deg,#ff4d6d,#c9184a);
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    cursor:pointer;
    box-shadow:0 20px 60px rgba(255,77,109,0.4);
    transition:0.6s;
    z-index:10;
}

.box:hover{
    transform:scale(1.05);
}

/* فتح */
.open{
    animation:pop 1s forwards;
}

@keyframes pop{
    to{transform:scale(0) rotate(360deg);opacity:0;}
}

/* 💬 النص */
#skyText{
    position:absolute;
    top:20%;
    width:100%;
    text-align:center;
    font-size:42px;
    font-weight:bold;
    opacity:0;
    transform:scale(0.5);
    text-shadow:0 0 25px white, 0 0 50px #ff4d6d;
    transition:2s;
}
</style>
</head>

<body>

<div class="moon"></div>

<div class="shooting" style="top:20%;animation-delay:0s;"></div>
<div class="shooting" style="top:50%;animation-delay:2s;"></div>
<div class="shooting" style="top:70%;animation-delay:4s;"></div>

<div id="skyText">بحبك اوي يا جومانا</div>

<div class="box" onclick="openBox()">🎁</div>

<script>

/* 🌟 توليد نجوم حقيقي */
for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(Math.random()*3+1)+"s";
    document.body.appendChild(s);
}

function openBox(){

    document.querySelector(".box").classList.add("open");

    setTimeout(()=>{
        let text=document.getElementById("skyText");
        text.style.opacity="1";
        text.style.transform="scale(1)";
    },900);
}

</script>

</body>
</html>
