<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gift Scene Alive</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background: radial-gradient(circle at top, #0b1230, #05060d, #000);
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* 🌌 نجوم */
.star{
    position:absolute;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* 🌠 شهاب */
.meteor{
    position:absolute;
    width:120px;
    height:2px;
    background:linear-gradient(90deg,#fff,transparent);
    animation:shoot 6s linear infinite;
    opacity:0;
}

@keyframes shoot{
    0%{transform:translate(-200px,100px);opacity:0;}
    10%{opacity:1;}
    100%{transform:translate(120vw,-200px);opacity:0;}
}

/* 🪐 كواكب */
.planet{
    position:absolute;
    border-radius:50%;
    opacity:0.9;
}

/* 🌙 قمر واقعي */
.moon{
    position:absolute;
    top:50px;
    right:60px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:
      radial-gradient(circle at 30% 30%, #fff, #d6d1a3 40%, #6b6a55);
    box-shadow:0 0 80px rgba(255,255,200,0.4);
}

/* 🎁 بوكس */
.gift{
    width:140px;
    height:140px;
    position:relative;
    cursor:pointer;
}

.base{
    width:100%;
    height:100%;
    background:#e63946;
    border-radius:14px;
}

.lid{
    width:100%;
    height:45%;
    background:#c1121f;
    position:absolute;
    top:0;
    border-radius:10px;
    transform-origin:bottom;
    transition:0.8s;
}

.open .lid{
    transform:rotateX(-140deg);
}

/* 💬 النص */
#topText{
    position:absolute;
    top:10%;
    width:100%;
    text-align:center;
    font-size:40px;
    font-weight:bold;
}

#sideText{
    position:absolute;
    right:8%;
    max-width:320px;
    font-size:20px;
    line-height:1.8;
    display:none;
}
</style>
</head>

<body>

<div class="moon"></div>
<div id="topText">بحبك اوي يا جومانا ❤️</div>

<div class="gift" id="gift" onclick="openGift()">
    <div class="lid"></div>
    <div class="base"></div>
</div>

<div id="sideText"></div>

<script>

/* 🌌 نجوم كثيفة */
for(let i=0;i<180;i++){
    let s=document.createElement("div");
    s.className="star";
    let size=Math.random()*3+1;

    s.style.width=size+"px";
    s.style.height=size+"px";

    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";

    s.style.animationDuration=(Math.random()*3+1)+"s";

    document.body.appendChild(s);
}

/* 🌠 شهب */
for(let i=0;i<4;i++){
    let m=document.createElement("div");
    m.className="meteor";
    m.style.top=Math.random()*100+"vh";
    m.style.animationDelay=(i*2)+"s";
    document.body.appendChild(m);
}

/* 🪐 كواكب */
for(let i=0;i<3;i++){
    let p=document.createElement("div");
    p.className="planet";
    let size=Math.random()*40+20;

    p.style.width=size+"px";
    p.style.height=size+"px";
    p.style.top=Math.random()*80+"vh";
    p.style.left=Math.random()*80+"vw";

    let colors=[
        "radial-gradient(circle,#7cc7ff,#1e3a8a)",
        "radial-gradient(circle,#ffb703,#fb8500)",
        "radial-gradient(circle,#90be6d,#2a9d8f)"
    ];

    p.style.background=colors[i];

    document.body.appendChild(p);
}

/* ✍️ typing */
function typeText(text, el, speed){
    let i=0;
    el.innerHTML="";
    function run(){
        if(i<text.length){
            el.innerHTML+=text[i];
            i++;
            setTimeout(run,speed);
        }
    }
    run();
}

/* 🎁 فتح */
function openGift(){
    document.getElementById("gift").classList.add("open");

    setTimeout(()=>{
        let side=document.getElementById("sideText");
        side.style.display="block";

        typeText(
`في لحظة زي دي...
الدنيا بتسكت عشانك ✨

وكل اللي حواليك بيقول:
إنك أغلى حاجة 💫

وإن الجمال ده مش صدفة ❤️`,
        side,35);

    },900);
}

</script>

</body>
</html>
