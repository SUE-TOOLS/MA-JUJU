<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Gift</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background: radial-gradient(circle at top, #0b1230, #05060d, #000);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    color:white;
}

/* 🌌 نجوم */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* 🌙 قمر واقعي */
.moon{
    position:absolute;
    top:50px;
    right:60px;
    width:130px;
    height:130px;
    border-radius:50%;
    background:
      radial-gradient(circle at 30% 30%, #fffbe6, #d6d1a3 40%, #8b8768 70%, #4b4a3a);
    box-shadow:0 0 80px rgba(255,255,200,0.5);
}

/* 🌍 كوكب */
.planet{
    position:absolute;
    bottom:80px;
    left:80px;
    width:90px;
    height:90px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #7cc7ff, #1e3a8a);
    box-shadow:0 0 40px rgba(124,199,255,0.4);
}

/* 🎁 بوكس هدية */
.gift{
    width:150px;
    height:150px;
    position:relative;
    cursor:pointer;
}

/* جسم */
.base{
    width:100%;
    height:100%;
    background:linear-gradient(145deg,#ff4d6d,#c9184a);
    border-radius:15px;
    position:absolute;
    bottom:0;
    box-shadow:0 20px 60px rgba(255,77,109,0.4);
}

/* غطا */
.lid{
    width:100%;
    height:50%;
    background:linear-gradient(145deg,#ff2e5e,#7a0000);
    position:absolute;
    top:0;
    border-radius:10px;
    transform-origin:bottom;
    transition:1s;
}

/* شريط */
.ribbon-v{
    position:absolute;
    width:18px;
    height:100%;
    background:#ffd166;
    left:50%;
    transform:translateX(-50%);
}

.ribbon-h{
    position:absolute;
    width:100%;
    height:18px;
    background:#ffd166;
    top:50%;
    transform:translateY(-50%);
}

/* فتح */
.open .lid{
    transform:rotateX(-140deg);
}

/* 💬 النص */
#text{
    display:none;
    position:absolute;
    top:18%;
    width:100%;
    text-align:center;
    font-size:40px;
    font-weight:bold;
    color:#f5f1e6;
    text-shadow:0 0 20px rgba(255,255,255,0.8),
                 0 0 40px rgba(255,215,120,0.6);
}

/* typing cursor */
.cursor{
    display:inline-block;
    animation:blink 0.8s infinite;
}
@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>

<body>

<div class="moon"></div>
<div class="planet"></div>

<div class="gift" id="gift" onclick="openGift()">
    <div class="lid"></div>
    <div class="base"></div>
    <div class="ribbon-v"></div>
    <div class="ribbon-h"></div>
</div>

<div id="text"></div>

<script>

/* 🌌 نجوم */
for(let i=0;i<140;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    s.style.width=(Math.random()*2+1)+"px";
    s.style.height=s.style.width;
    document.body.appendChild(s);
}

/* 💬 typing effect */
function typeText(text, el, speed){
    let i = 0;
    el.innerHTML = "";

    function run(){
        if(i < text.length){
            el.innerHTML += text[i];
            i++;
            setTimeout(run, speed);
        }
    }

    run();
}

/* 🎁 فتح البوكس */
function openGift(){

    document.getElementById("gift").classList.add("open");

    setTimeout(()=>{
        let t = document.getElementById("text");
        t.style.display = "block";

        typeText(
`بحبك اوي يا جومانا ❤️

كل اللي هنا معمول علشانك ✨

مش مجرد موقع...
دي لحظة ليكي إنتي بس 💫`,
        t, 35);

    }, 900);
}

</script>

</body>
</html>
