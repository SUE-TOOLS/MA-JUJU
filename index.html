<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gift Surprise</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial;
    background: linear-gradient(180deg, #0f1020, #1b1e3a, #0a0b14);
    color:white;
}

/* نجوم ناعمة */
.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    animation: twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:0.2; transform:scale(1);}
    50%{opacity:1; transform:scale(1.5);}
}

/* صندوق جميل */
.box{
    width:140px;
    height:140px;
    background: linear-gradient(145deg,#ff4d6d,#ff2e5e);
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(255,77,109,0.5);
    transition:0.4s;
    position:relative;
}

.box:hover{
    transform:scale(1.05);
}

/* فتح */
.open{
    animation: pop 0.8s forwards;
}

@keyframes pop{
    0%{transform:scale(1);}
    100%{transform:scale(0) rotate(360deg); opacity:0;}
}

/* الرسالة */
#message{
    display:none;
    text-align:center;
    max-width:320px;
    font-size:18px;
    line-height:1.7;
    animation: fade 1.5s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* الصورة */
#photo{
    display:none;
    width:220px;
    border-radius:20px;
    margin-top:15px;
    box-shadow:0 10px 25px rgba(255,255,255,0.3);
}

/* الحب */
#love{
    display:none;
    font-size:34px;
    color:#ff4d6d;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box" id="box" onclick="openBox()">🎁</div>

<div id="message"></div>

<img id="photo" src="your-photo.jpg">

<div id="love">بحبك يا جومانا ❤️</div>

<script>

/* نجوم */
for(let i=0;i<80;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(s);
}

/* كتابة */
function typeText(text, el, speed){
    let i=0;
    function run(){
        if(i<text.length){
            el.innerHTML += text[i];
            i++;
            setTimeout(run,speed);
        }
    }
    run();
}

function openBox(){

    document.getElementById("box").classList.add("open");

    setTimeout(()=>{
        let msg=document.getElementById("message");
        msg.style.display="block";

        typeText(
`عندي ليكي حاجة بسيطة... بس من قلبي ❤️

وجودك في حياتي مش صدفة عادية ✨
ده أحلى حاجة حصلتلي 💫
وكل لحظة معاكي ليها معنى مختلف ❤️`,
        msg,40);
    },800);

    setTimeout(()=>{
        document.getElementById("photo").style.display="block";
    },5000);

    setTimeout(()=>{
        document.getElementById("love").style.display="block";
    },6500);
}
</script>

</body>
</html>
